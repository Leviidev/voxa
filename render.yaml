services:
  - type: web
    name: voxa
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd website && npm install && npm run build
    startCommand: cd website && node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: voxa-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: voxa-db
    region: oregon
    plan: free
    databaseName: voxa
    user: voxa
