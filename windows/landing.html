<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0B0B0C;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Custom title bar ── */
    .titlebar {
      height: 38px;
      background: #111113;
      display: flex;
      align-items: center;
      padding: 0 14px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .wc {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .wc-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: filter 0.15s;
      position: relative;
    }
    .wc-btn:hover { filter: brightness(0.8); }

    .wc-close { background: #FF5F57; }
    .wc-min   { background: #FEBC2E; }
    .wc-max   { background: #28C840; }

    /* ── Main content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: #E53935;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(229,57,53,0.45);
      flex-shrink: 0;
    }
    .logo-icon span {
      color: #fff;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
    }
    .logo-wordmark {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: #fff;
    }

    /* Tagline */
    .tagline {
      text-align: center;
    }
    .tagline h2 {
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .tagline p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      max-width: 300px;
      line-height: 1.6;
    }

    /* CTA */
    .cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .open-btn {
      background: #E53935;
      color: #fff;
      border: none;
      padding: 15px 52px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 24px rgba(229,57,53,0.4);
      letter-spacing: -0.2px;
    }
    .open-btn:hover {
      background: #C62828;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(229,57,53,0.5);
    }
    .open-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 12px rgba(229,57,53,0.3);
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }

    /* Footer */
    .footer {
      padding: 18px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

  <div class="titlebar">
    <div class="wc">
      <button class="wc-btn wc-close"  title="Close"    onclick="window.electronVoxa.windowControl('close')"></button>
      <button class="wc-btn wc-min"    title="Minimize" onclick="window.electronVoxa.windowControl('minimize')"></button>
      <button class="wc-btn wc-max"    title="Maximize" onclick="window.electronVoxa.windowControl('maximize')"></button>
    </div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-icon"><span>v</span></div>
      <div class="logo-wordmark">voxa</div>
    </div>

    <div class="tagline">
      <h2>Talk somewhere you actually like.</h2>
      <p>Servers, channels, voice, and video — all free. No paid tiers, no locked features, no Nitro.</p>
    </div>

    <div class="cta">
      <button class="open-btn" onclick="window.electronVoxa.openApp()">Open Voxa</button>
      <span class="hint">Free &amp; open source</span>
    </div>
  </div>

  <div class="footer">voxa.lol</div>

</body>
</html>
