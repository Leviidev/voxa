name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['macos/**']

jobs:
  build:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: macos
        run: npm install

      - name: Build DMG
        working-directory: macos
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxa-macOS-${{ github.sha }}
          path: macos/dist/*.dmg
          retention-days: 30
