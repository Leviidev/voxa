name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Code signing (requires GitHub Secrets) ─────────────────────────────
      # Set these in your repo: Settings → Secrets → Actions
      #   IOS_CERT_BASE64       — base64-encoded P12 certificate
      #   IOS_CERT_PASSWORD     — P12 password
      #   IOS_PROFILE_BASE64    — base64-encoded .mobileprovision
      #   APPLE_TEAM_ID         — 10-char Apple Team ID

      - name: Install certificate
        if: ${{ env.IOS_CERT_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 20)
          echo "$IOS_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/cert.p12 -P "$IOS_CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ env.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/voxa.mobileprovision

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Resolve package dependencies
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project Voxa.xcodeproj \
            -scheme Voxa 2>&1 | tail -20 || true

      - name: Build for simulator (verifies compilation)
        run: |
          cd ios
          xcodebuild build \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | grep -E '(error:|warning:|Build succeeded|Build FAILED)' | tail -30

      # ── Archive & IPA (only when signing secrets are present) ─────────────

      - name: Archive
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios
          xcodebuild archive \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            2>&1 | grep -E '(error:|warning:|ARCHIVE SUCCEEDED|ARCHIVE FAILED)' | tail -30

      - name: Export IPA
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/REPLACE_TEAM_ID/$APPLE_TEAM_ID/" ios/ExportOptions.plist \
            > $RUNNER_TEMP/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            2>&1 | tail -10

      - name: Upload IPA
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: Voxa-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      # ── Simulator build artifact (no signing certs) ────────────────────────

      - name: Build unsigned .app for simulator
        if: ${{ env.IOS_CERT_BASE64 == '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
        run: |
          cd ios
          xcodebuild build \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -10

      - name: Upload simulator build
        if: ${{ env.IOS_CERT_BASE64 == '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: Voxa-Simulator-${{ github.sha }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Release-iphonesimulator/Voxa.app
          retention-days: 14
          if-no-files-found: warn
