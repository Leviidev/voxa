name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project Voxa.xcodeproj \
            -scheme Voxa 2>&1 | tail -20 || true

      - name: Archive (unsigned — real device)
        run: |
          cd ios
          xcodebuild archive \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            2>&1 | grep -E '(error:|warning:|ARCHIVE SUCCEEDED|ARCHIVE FAILED)' | tail -30

      - name: Package unsigned IPA
        run: |
          APPS_DIR=$RUNNER_TEMP/Voxa.xcarchive/Products/Applications
          PAYLOAD=$RUNNER_TEMP/export/Payload
          mkdir -p "$PAYLOAD"
          cp -R "$APPS_DIR/Voxa.app" "$PAYLOAD/Voxa.app"
          cd $RUNNER_TEMP/export
          zip -r Voxa.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Voxa-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/export/Voxa.ipa
          retention-days: 30
          if-no-files-found: error
