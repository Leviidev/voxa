name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Code signing (optional — add these secrets for a signed IPA) ──────────
      # Settings → Secrets → Actions:
      #   IOS_CERT_BASE64    — base64-encoded P12 distribution certificate
      #   IOS_CERT_PASSWORD  — P12 password
      #   IOS_PROFILE_BASE64 — base64-encoded .mobileprovision
      #   APPLE_TEAM_ID      — 10-char Apple Team ID

      - name: Install certificate
        if: ${{ secrets.IOS_CERT_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 20)
          echo "$IOS_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/cert.p12 -P "$IOS_CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ secrets.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/voxa.mobileprovision

      # ── Resolve dependencies ──────────────────────────────────────────────────

      - name: Resolve package dependencies
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project Voxa.xcodeproj \
            -scheme Voxa 2>&1 | tail -20 || true

      # ── Archive for real device ───────────────────────────────────────────────

      - name: Archive (signed)
        if: ${{ secrets.IOS_CERT_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios
          xcodebuild archive \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            2>&1 | grep -E '(error:|warning:|ARCHIVE SUCCEEDED|ARCHIVE FAILED)' | tail -30

      - name: Archive (unsigned — no signing secrets)
        if: ${{ secrets.IOS_CERT_BASE64 == '' }}
        run: |
          cd ios
          xcodebuild archive \
            -project Voxa.xcodeproj \
            -scheme Voxa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            2>&1 | grep -E '(error:|warning:|ARCHIVE SUCCEEDED|ARCHIVE FAILED)' | tail -30

      # ── Export IPA ────────────────────────────────────────────────────────────

      - name: Export IPA (signed)
        if: ${{ secrets.IOS_CERT_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/REPLACE_TEAM_ID/$APPLE_TEAM_ID/" ios/ExportOptions.plist \
            > $RUNNER_TEMP/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Voxa.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            2>&1 | tail -10
          echo "IPA_PATH=$RUNNER_TEMP/export" >> $GITHUB_ENV

      - name: Package unsigned IPA from archive
        if: ${{ secrets.IOS_CERT_BASE64 == '' }}
        run: |
          APPS_DIR=$RUNNER_TEMP/Voxa.xcarchive/Products/Applications
          PAYLOAD=$RUNNER_TEMP/export/Payload
          mkdir -p "$PAYLOAD"
          cp -R "$APPS_DIR/Voxa.app" "$PAYLOAD/Voxa.app"
          cd $RUNNER_TEMP/export
          zip -r Voxa.ipa Payload
          echo "IPA_PATH=$RUNNER_TEMP/export" >> $GITHUB_ENV

      # ── Upload artifact ───────────────────────────────────────────────────────

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Voxa-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/export/Voxa.ipa
          retention-days: 30
          if-no-files-found: error
